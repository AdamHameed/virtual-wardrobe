services:
  db:
    image: postgres:16-alpine
    container_name: virtual-closet-db
    environment:
      POSTGRES_DB: virtual_closet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d virtual_closet"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: virtual-closet-backend
    environment:
      VC_APP_ENV: development
      VC_DEBUG: "true"
      VC_DATABASE_URL: ${VC_DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/virtual_closet}
      VC_CORS_ORIGINS: ${VC_CORS_ORIGINS:-http://localhost:3000}
      VC_MEDIA_ROOT: ${VC_MEDIA_ROOT:-/app/media}
      VC_MEDIA_URL: ${VC_MEDIA_URL:-/media}
      VC_SECRET_KEY: ${VC_SECRET_KEY:-change-me-in-production}
      VC_ACCESS_TOKEN_EXPIRE_MINUTES: ${VC_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      VC_JWT_ALGORITHM: ${VC_JWT_ALGORITHM:-HS256}
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: virtual-closet-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  backend_media:
  frontend_node_modules:
  frontend_next:
